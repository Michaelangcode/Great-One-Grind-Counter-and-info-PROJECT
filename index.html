<!DOCTYPE html>
<html>
<head>
    <title>Great One Grind Counter</title>
    <link rel="icon" type="image/png" href="icon192.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div class="app">
  <div class="wrap" id="appRoot">
    <div class="loading-note">Loading your grind log…</div>
  </div>
</div>

<div id="confirmModal" class="modal hidden">
  <div class="modal-box">
    <p id="modalText"></p>
    <div class="modal-actions">
      <button id="modalCancel">Cancel</button>
      <button id="modalConfirm" class="confirm-danger">Confirm</button>
    </div>
  </div>
</div>

<div id="wizardModal" class="modal hidden wizard-modal">
  <div class="modal-box">
    <div id="wizardContent"></div>
    <div class="wizard-footer">
      <button id="wizardBackBtn" class="reset-link" style="display:none;">&larr; Back</button>
      <button id="wizardCancelBtn" class="reset-link">Cancel</button>
    </div>
  </div>
</div>

<div id="trophyModal" class="modal hidden">
  <div class="modal-box">
    <p>Great One logged! Would you like to add trophy details?</p>
    <div class="modal-actions">
      <button id="trophyModalSkip">Skip</button>
      <button id="trophyModalYes" class="confirm-go">Add Details</button>
    </div>
  </div>
</div>

<div id="trophyFormModal" class="modal hidden">
  <div class="modal-box trophy-form-box">
    <h3 class="trophy-form-title">Trophy Details</h3>
    <div class="trophy-form-fields">
      <label>Outcome
        <select id="tfOutcome">
          <option value="">— Select —</option>
          <option value="Successfully Hunted">Successfully Hunted</option>
          <option value="Botched">Botched</option>
        </select>
      </label>
      <label>Weight
        <div class="weight-row">
          <input type="text" id="tfWeight" placeholder="e.g. 312">
          <select id="tfWeightUnit">
            <option value="kg">kg</option>
            <option value="lbs">lbs</option>
          </select>
        </div>
      </label>
      <label>Fur Type<input type="text" id="tfFur" placeholder="e.g. Fabled…"></label>
      <label>Score<input type="text" id="tfScore" placeholder="e.g. 263.18"></label>
      <div id="tfAntlerRow">
        <label>Antler / Horn Variation
          <div class="antler-row">
            <input type="text" id="tfAntler" placeholder="e.g. Palmated, Non-Typical…">
            <select id="tfAntlerQuick">
              <option value="">Quick fill</option>
              <option value="N/A">N/A</option>
            </select>
          </div>
        </label>
      </div>
      <label>Personal Notes<textarea id="tfNotes" placeholder="Anything worth remembering about this hunt…" rows="3"></textarea></label>
    </div>
    <div class="modal-actions" style="margin-top:16px;">
      <button id="trophyFormCancel">Cancel</button>
      <button id="trophyFormSubmit" class="confirm-go">Save</button>
    </div>
  </div>
</div>

<div id="counterEditModal" class="modal hidden">
  <div class="modal-box trophy-form-box">
    <div id="counterEditBody"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button id="counterEditCancel">Cancel</button>
      <button id="counterEditSave" class="confirm-go">Save</button>
    </div>
  </div>
</div>
<div id="keybindModal" class="modal hidden">
  <div class="modal-box" style="max-width:320px;">
    <div id="keybindLabel" style="font-family:'Merriweather',serif;font-weight:700;font-size:14px;margin-bottom:14px;color:var(--text);"></div>
    <div id="keybindStatus" class="keybind-status waiting">Press any key…</div>
    <div class="modal-actions" style="margin-top:16px;flex-direction:column;gap:8px;">
      <button id="keybindSaveBtn" class="keybind-save-btn" disabled>Save Setting</button>
      <button id="keybindCancelBtn" class="reset-link">Cancel</button>
    </div>
  </div>
</div>
<div id="updateBanner" style="display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;border:1px solid #d4af37;font-size:13px;z-index:9999;gap:10px;align-items:center;">
  <span>Update available.</span>
  <button id="updateReloadBtn" style="background:#d4af37;color:#000;border:none;border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;">Reload</button>
</div>
<div id="cookieConsentBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:14px 16px;font-size:13px;z-index:10000;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;border-top:1px solid #d4af37;">
  <span style="max-width:600px;">This app uses local device storage to save your progress. See our <a href="privacy.html" style="color:#d4af37;">Privacy Policy</a> for details.</span>
  <button id="cookieConsentBtn" style="background:#d4af37;color:#000;border:none;border-radius:5px;padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap;">Got it</button>
</div>
<script>
(function() {
  var CONSENT_KEY = 'cookieConsentAccepted';
  if (!localStorage.getItem(CONSENT_KEY)) {
    document.getElementById('cookieConsentBanner').style.display = 'flex';
  }
  document.getElementById('cookieConsentBtn').addEventListener('click', function() {
    localStorage.setItem(CONSENT_KEY, 'true');
    document.getElementById('cookieConsentBanner').style.display = 'none';
  });
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then((reg) => {
if (reg.waiting) {
        document.getElementById('updateBanner').style.display = 'flex';
      }
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            document.getElementById('updateBanner').style.display = 'flex';
          }
        });
      });
    });
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloading) return;
      reloading = true;
      window.location.reload();
    });
    document.getElementById('updateReloadBtn').addEventListener('click', () => {
      navigator.serviceWorker.getRegistration().then((reg) => {
        if (!reg) return;
        if (reg.waiting) {
          reg.waiting.postMessage('SKIP_WAITING');
        } else if (reg.installing) {
          reg.installing.addEventListener('statechange', function fn(e) {
            if (e.target.state === 'installed') {
              e.target.postMessage('SKIP_WAITING');
              e.target.removeEventListener('statechange', fn);
            }
          });
        }
      });
    });
  });
}
</script>
<!-- Session Goal: number input modal -->
<div id="sgInputModal" class="modal hidden">
  <div class="modal-box" style="max-width:280px; text-align:center;">
    <div id="sgModalTitle" style="font-family:'Merriweather',serif;font-weight:700;font-size:14px;margin-bottom:14px;color:var(--text);"></div>
    <input type="number" id="sgModalInput" class="sg-input" placeholder="Number of kills" min="1" style="width:100%;box-sizing:border-box;margin-bottom:14px;">
    <div class="modal-actions">
      <button id="sgModalCancel">Cancel</button>
      <button id="sgModalDelete" class="confirm-danger" style="display:none;">Delete Goal</button>
      <button id="sgModalConfirm" class="confirm-go">Set Goal</button>
    </div>
  </div>
</div>

<!-- Session Goal: goal met modal -->
<div id="sgGoalMetModal" class="modal hidden">
  <div class="modal-box" style="max-width:280px; text-align:center;">
    <p style="font-size:22px;margin:0 0 6px;">🎯</p>
    <p style="font-family:'Merriweather',serif;font-weight:700;font-size:15px;margin:0 0 10px;color:var(--text);">You met your goal!</p>
    <p style="font-size:12px;color:var(--muted);margin:0 0 18px;">Want to set a new session goal?</p>
    <div class="modal-actions">
      <button id="sgMetCancel">No thanks</button>
      <button id="sgMetNewGoal" class="confirm-go">Set New Goal</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
